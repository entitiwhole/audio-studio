name: CI Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Build Debug
      shell: bash
      run: |
        cd AudioStudio
        dotnet build AudioStudio.csproj -c Debug
    
    - name: Build Release
      shell: bash
      run: |
        cd AudioStudio
        dotnet build AudioStudio.csproj -c Release
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AudioStudio-${{ github.run_number }}
        path: |
          AudioStudio/bin/Debug/
          AudioStudio/bin/Release/