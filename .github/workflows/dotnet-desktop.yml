name: Build AudioStudio

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    
    - name: Build Debug
      run: |
        cd AudioStudio
        dotnet build AudioStudio.csproj -c Debug -p:Platform=x64
    
    - name: Build Release
      run: |
        cd AudioStudio
        dotnet build AudioStudio.csproj -c Release -p:Platform=x64
    
    - name: Upload build
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: AudioStudio-build-${{ github.run_id }}
        path: |
          AudioStudio/bin/Debug/
          AudioStudio/bin/Release/
        retention-days: 7