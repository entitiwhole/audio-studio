name: .NET Core Desktop

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Build Debug
      run: dotnet build AudioStudio.sln -c Debug -p:Platform=x64

    - name: Build Release
      run: dotnet build AudioStudio.sln -c Release -p:Platform=x64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AudioStudio-build
        path: |
          AudioStudio/bin/x64/Debug/
          AudioStudio/bin/x64/Release/